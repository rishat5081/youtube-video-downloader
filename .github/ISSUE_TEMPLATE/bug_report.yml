name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: ["rishat5081"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Paste URL '...'
        3. Click 'Analyze'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux (Ubuntu/Debian)
        - Linux (Arch)
        - Linux (Other)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.x.x"

  - type: input
    id: electron-version
    attributes:
      label: Electron Version
      description: From package.json or app About dialog
      placeholder: "30.x.x"

  - type: dropdown
    id: tools
    attributes:
      label: Tool Status
      description: Are yt-dlp and ffmpeg detected by the app?
      options:
        - Both detected (green dots)
        - yt-dlp missing (red dot)
        - ffmpeg missing (red dot)
        - Both missing

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any error messages or console output.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
